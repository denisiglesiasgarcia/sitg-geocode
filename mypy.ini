[mypy]
python_version = 3.13
strict = False
; Gradually enable these as you add type hints:
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
disallow_untyped_defs = False
; flip to True once all functions are annotated
ignore_missing_imports = True
; third-party libs without stubs (streamlit, pymongo…)
exclude = (tests/|mkdocs/)
