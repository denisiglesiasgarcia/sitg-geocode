# Pre-commit hooks — ruff, gitleaks, bandit, ty.
# uv operations (version bump, lock, sync, export) run automatically as
# hooks below on every `git commit` (which `make commit` just wraps).
#
# This file is synced into target repos by repo-file-sync-action — see
# .github/sync.yml in this repo. Don't edit it directly in a target repo;
# edit it here and let the sync PR carry the change out.
#
# First-time setup (per repo):
#   pre-commit install
#   pre-commit autoupdate   # pins hook revs to their actual latest release

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "bandit.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.55
    hooks:
      - id: ty
        # Override the default `uv check` entry: it exits non-zero on any
        # diagnostic, ignoring per-rule severity. Call `ty` directly so rules
        # downgraded to "warn" in ty.toml's [rules] stay visible but non-blocking.
        entry: ty check --exit-zero-on-warning
        additional_dependencies: ["ty==0.0.55"]

  - repo: local
    hooks:
      - id: auto-bump-patch
        name: auto bump patch version
        language: script
        entry: scripts/auto_bump_patch.sh
        stages: [pre-commit]
        always_run: true
        pass_filenames: false

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.25
    hooks:
      # uv-lock must run before uv-export: otherwise requirements.txt is
      # exported from the pre-upgrade lock and drifts from the final uv.lock.
      - id: uv-lock
        args: ["--upgrade"]
      - id: uv-export
        args: ["--frozen", "--output-file=requirements.txt", "--quiet"]
      - id: uv-sync
        args: ["--locked", "--all-packages"]

  - repo: local
    hooks:
      - id: tag-version
        name: tag version after commit
        language: script
        entry: scripts/tag_version.sh
        stages: [post-commit]
        always_run: true
        pass_filenames: false
